theme = "catppuccin_mocha"

[editor]
line-number = "relative"
mouse = false
bufferline = "multiple"
color-modes = true
# end-of-line-diagnostics = "hint"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.lsp]
display-messages = true # Show LSP status (initializing, etc)
# display-inlay-hints = true

[editor.indent-guides]
render = true
character = "╎"
skip-level = 1

# [editor.inline-diagnostics]
# cursor-line = "warning" # show warnings and errors on the cursorline inline
